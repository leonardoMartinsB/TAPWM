<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Atividade 7</h1>

        <section>
            <h3>1. Maior de Três Números</h3>
            <div class="input-group">
                <input type="number" id="n1_1" placeholder="N1">
                <input type="number" id="n1_2" placeholder="N2">
                <input type="number" id="n1_3" placeholder="N3">
            </div>
            <button onclick="uiMaior()">Verificar</button>
            <div class="resultado" id="res1"></div>
        </section>

        <section>
            <h3>2. Ordem Crescente</h3>
            <div class="input-group">
                <input type="number" id="n2_1" placeholder="N1">
                <input type="number" id="n2_2" placeholder="N2">
                <input type="number" id="n2_3" placeholder="N3">
            </div>
            <button onclick="uiOrdem()">Ordenar</button>
            <div class="resultado" id="res2"></div>
        </section>

        <section>
            <h3>3. Verificador de Palíndromo</h3>
            <div class="input-group">
                <input type="text" id="str3" placeholder="Digite o texto">
            </div>
            <button onclick="uiPalindromo()">Verificar</button>
            <div class="resultado" id="res3"></div>
        </section>

        <section>
            <h3>4. Verificar Subconjunto</h3>
            <div class="input-group">
                <input type="text" id="p4_1" placeholder="Texto">
                <input type="text" id="p4_2" placeholder="Subconjunto">
            </div>
            <button onclick="uiSub()">Verificar</button>
            <div class="resultado" id="res4"></div>
        </section>

        <section>
            <h3>5. Dia da Semana</h3>
            <div class="input-group">
                <input type="date" id="data5">
            </div>
            <button onclick="uiDia()">Verificar</button>
            <div class="resultado" id="res5"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>

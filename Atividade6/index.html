<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Triângulos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tipo de Triângulo</h1>
        <p>Insira 3 valores para verificar se formam um triângulo e qual o seu tipo.</p>
        
        <div class="input-group">
            <label for="ladoA">Lado A:</label>
            <input type="number" id="ladoA" placeholder="Digite o valor de A">
        </div>
        
        <div class="input-group">
            <label for="ladoB">Lado B:</label>
            <input type="number" id="ladoB" placeholder="Digite o valor de B">
        </div>
        
        <div class="input-group">
            <label for="ladoC">Lado C:</label>
            <input type="number" id="ladoC" placeholder="Digite o valor de C">
        </div>
        
        <button id="btnVerificar">Verificar</button>
        
        <div id="resultado" class="resultado-box hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
